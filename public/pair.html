<!doctype html>
<html>
  <head><meta charset="utf-8"/><title>Pair Device</title></head>
  <body>
    <h1>Simple Pair</h1>
    <p id="status">Checking...</p>
    <input id="code" placeholder="R7KD-2M9Q" />
    <button id="resolve">Resolve</button>
    <button id="claim" style="display:none;">Pair this device</button>
    <button id="complete" style="display:none;">Complete Dashboard Sign-in</button>
    <pre id="out"></pre>
    <script>
      let sessionId = null;
      let approvedPoll = null;
      function prefillCodeFromPath() {
        const parts = window.location.pathname.split('/').filter(Boolean);
        if (parts.length === 2 && parts[0] === 'pair') {
          document.getElementById('code').value = decodeURIComponent(parts[1]).toUpperCase();
        }
      }
      async function check() {
        const s = await fetch('/pair/status').then(r=>r.json());
        document.getElementById('status').textContent = s.active ? `Active until ${s.expiresAt}` : 'Pairing not active';
      }
      document.getElementById('resolve').onclick = async () => {
        const code = document.getElementById('code').value;
        const r = await fetch('/pair/resolve',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({code})});
        const j = await r.json();
        sessionId = j.sessionId;
        if (j?.ok && j?.sessionId) {
          document.getElementById('claim').style.display = 'inline-block';
        }
        document.getElementById('out').textContent = JSON.stringify(j,null,2);
      };
      document.getElementById('claim').onclick = async () => {
        if(!sessionId){ alert('Resolve first'); return; }
        const r = await fetch('/pair/claim',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({sessionId, client:{kind:'web'}})});
        const j = await r.json();
        let hint = '';
        if (j?.approval?.nextCommand) {
          hint = `\n\nAdmin next step:\n- Telegram: ${j.approval.nextCommand}\n- Or web approve via ${j.approval.webEndpoint}\n- Current requestId: ${j.requestId}`;
        }
        document.getElementById('out').textContent = JSON.stringify(j,null,2) + hint;

        if (approvedPoll) clearInterval(approvedPoll);
        approvedPoll = setInterval(async () => {
          const st = await fetch(`/pair/claim-status?sessionId=${encodeURIComponent(sessionId)}`).then(x=>x.json()).catch(()=>null);
          if (st?.status === 'approved') {
            clearInterval(approvedPoll);
            document.getElementById('complete').style.display = 'inline-block';
          }
        }, 2000);
      };
      document.getElementById('complete').onclick = async () => {
        if(!sessionId){ alert('No session'); return; }
        const r = await fetch('/pair/handoff/create',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({sessionId})});
        const j = await r.json();
        if (!j?.handoffUrl) {
          document.getElementById('out').textContent = JSON.stringify(j,null,2);
          return;
        }
        window.location.href = j.handoffUrl;
      };
      prefillCodeFromPath();
      check();
    </script>
  </body>
</html>
